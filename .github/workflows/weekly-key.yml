name: TURKHUB KEY SYSTEM

on:
  schedule:
    - cron: '5 15 * * *'          # 22:05 Asia/Bangkok = 15:05 UTC
  workflow_dispatch:

jobs:
  key-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4   # อัพเป็น v4 ดีกว่า (2025 แล้ว)

      - name: Set timezone and check time (safety)
        id: checktime
        run: |
          NOW=$(TZ="Asia/Bangkok" date +"%H:%M")
          echo "Current time (Thailand): $NOW"
          
          # ใส่เงื่อนไขเผื่อ cron ล่าช้าเล็กน้อย (optional แต่แนะนำ)
          if [[ "$NOW" == "22:0"[4-6] ]]; then
            echo "RUN=true" >> $GITHUB_ENV
          else
            echo "RUN=false" >> $GITHUB_ENV
            echo "Not 22:05 window → skip"
          fi

      - name: Generate and write key
        if: env.RUN == 'true'
        run: |
          KEY="TURKHUB-$(openssl rand -hex 3)"
          echo "$KEY" > KEY
          echo "Generated key: $KEY"
          echo "KEY=$KEY" >> $GITHUB_ENV

      - name: Commit and push key
        if: env.RUN == 'true'
        run: |
          git config user.name  "turkhub-bot"
          git config user.email "bot@github.com"
          
          git add KEY
          git commit -m "Update daily key → ${{ env.KEY }}" || echo "Nothing to commit"
          git push origin HEAD

      - name: Send to Discord
        if: env.RUN == 'true'
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}   # อย่า hardcode ใน .yml !
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"@everyone **Key ใหม่ประจำวัน** : \`${{ env.KEY }}\`\"}" \
            "$WEBHOOK"
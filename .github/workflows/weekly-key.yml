name: TURKHUB KEY SYSTEM

on:
  schedule:
    - cron: '52 19 * * *'   # 03:50 PM US Eastern Time
  workflow_dispatch:

jobs:
  generate-key:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Generate Key
      run: |
        KEY="TURKHUB-$(openssl rand -hex 3)"
        echo "$KEY" > KEY
        echo "KEY=$KEY" >> $GITHUB_ENV

    - name: Commit Key
      run: |
        git config user.name "turkhub-bot"
        git config user.email "bot@github.com"
        git add KEY
        git commit -m "🔑 Key Update: $KEY" || echo "No changes"
        git push

    - name: Send Key To Discord
      run: |
        curl -X POST "$WEBHOOK" \
        -H "Content-Type: application/json" \
        -d "{
          \"content\": \"@everyone KeyNew : \`${{ env.KEY }}\`\",
          \"embeds\": [{
            \"title\": \"🗝️ TURK HUB KEY\",
            \"description\": \"New key generated at 03:50 PM (US Time)\",
            \"color\": 5763719,
            \"fields\": [{
              \"name\": \"Copy Key\",
              \"value\": \"\`${{ env.KEY }}\`\"
            }],
            \"footer\": {
              \"text\": \"TURK HUB KEY SYSTEM\"
            }
          }]
        }"
      env:
        WEBHOOK: https://discord.com/api/webhooks/1479462633383006373/p_GjlNQrYuQuZulcen9SxJExpZMF4oYdqQsMD235rYvmapsBTIQdhoHXlmrz0gzEkVLO
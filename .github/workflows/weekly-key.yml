name: Daily Key

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Key
        run: |
          KEY="TURKHUB-$(openssl rand -hex 4)"
          echo $KEY > KEY
          echo "KEY=$KEY" >> $GITHUB_ENV

      - name: Commit Key
        run: |
          git config --global user.name "keybot"
          git config --global user.email "bot@github.com"
          git add KEY
          git commit -m "Update Daily Key"
          git push

      - name: Send Discord
        run: |
          curl -H "Content-Type: application/json" \
          -d "{
          \"embeds\": [{
          \"title\": \"🗝️ KEYNEW\",
          \"description\": \"Key reset every day 00:00\",
          \"color\": 3066993,
          \"fields\": [
          {
          \"name\": \"Key\",
          \"value\": \"${KEY}\"
          }
          ]
          }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
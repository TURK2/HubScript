name: Weekly Key Generator

on:
  schedule:
    - cron: '0 0 * * 1'   # ทุกวันจันทร์
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-key:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate key
        run: |
          KEY="TURK-$(date +%s | sha256sum | head -c 10)"
          echo $KEY > KEY
          echo "Generated key: $KEY"

      - name: Commit key
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add KEY
          git commit -m "Update weekly key"
          git push

      - name: Send key to Discord
        run: |
          KEY=$(cat KEY)
          curl -H "Content-Type: application/json" \
          -d "{\"content\":\"New Weekly Key: $KEY\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
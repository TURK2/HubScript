name: TURKHUB Key Generator

on:
  schedule:
    - cron: '40 19 * * *'   # 00:00 Thailand (UTC+7)
  workflow_dispatch:

jobs:
  generate-key:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Generate new key
      run: |
        KEY="TURKHUB-$(date +%s | sha256sum | head -c 6)"
        echo $KEY > KEY
        echo "New key: $KEY"

    - name: Commit new key
      run: |
        git config user.name "turkhub-bot"
        git config user.email "bot@github.com"
        git add KEY
        git commit -m "Auto update key"
        git push
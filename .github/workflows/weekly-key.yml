name: TURKHUB KEY SYSTEM

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  key-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Check Time
      id: time
      run: |
        NOW=$(TZ="America/New_York" date +"%H:%M")
        echo "TIME=$NOW"
        
        if [ "$NOW" = "16:09" ]; then
          echo "RUN=true" >> $GITHUB_ENV
        else
          echo "RUN=false" >> $GITHUB_ENV
        fi

    - name: Generate Key
      if: env.RUN == 'true'
      run: |
        KEY="TURKHUB-$(openssl rand -hex 3)"
        echo "$KEY" > KEY
        echo "KEY=$KEY" >> $GITHUB_ENV

    - name: Push Key
      if: env.RUN == 'true'
      run: |
        git config user.name "turkhub-bot"
        git config user.email "bot@github.com"
        git add KEY
        git commit -m "Key Update $KEY"
        git push

    - name: Send Discord
      if: env.RUN == 'true'
      run: |
        curl -H "Content-Type: application/json" \
        -d "{\"content\":\"@everyone KeyNew : \`${{ env.KEY }}\`\"}" \
        $WEBHOOK
      env:
        WEBHOOK: https://discord.com/api/webhooks/1479462633383006373/p_GjlNQrYuQuZulcen9SxJExpZMF4oYdqQsMD235rYvmapsBTIQdhoHXlmrz0gzEkVLO
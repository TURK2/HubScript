name: Daily Key Generator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-key:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate Key
        run: |
          KEY="TURKHUB-$(openssl rand -hex 4)"
          DEVKEY="TURKHUB-DEV-$(openssl rand -hex 6)"

          echo $KEY > KEY
          echo $DEVKEY > DEVKEY

      - name: Commit new keys
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add KEY DEVKEY
          git commit -m "Update daily key"
          git push

      - name: Send Key To Discord
        run: |
          KEY=$(cat KEY)

          curl -H "Content-Type: application/json" \
          -d "{
            \"content\": \"@everyone\",
            \"embeds\": [{
              \"title\": \"KEYNEW 🗝️\",
              \"description\": \"The key resets every day at 00:00 AM.\n\nCopy Key Below:\n\`\`\`$KEY\`\`\`\",
              \"color\": 65280
            }]
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}
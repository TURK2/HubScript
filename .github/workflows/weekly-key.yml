name: TURKHUB KEY SYSTEM

on:
  schedule:
    - cron: '20 15 * * *'          # 22:05 Asia/Bangkok = 15:05 UTC
  workflow_dispatch:

jobs:
  key-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Key
        run: |
          KEY="TURKHUB-$(openssl rand -hex 3)"
          echo "$KEY" > KEY
          echo "KEY=$KEY" >> $GITHUB_ENV
          echo "Generated key: $KEY"

      - name: Commit and Push Key
        run: |
          git config user.name "turkhub-bot"
          git config user.email "bot@github.com"
          git add KEY
          git commit -m "Update daily key: ${{ env.KEY }}" || echo "No changes to commit"
          git push origin HEAD || echo "Push failed (maybe no change)"

      - name: Send to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}  # ย้าย URL มาที่ Repository Secrets ชื่อ DISCORD_WEBHOOK
        run: |
          curl -H "Content-Type: application/json" \
            -d "{\"content\":\"@everyone **Key** : \`${{ env.KEY }}\` \n time: $(date '+%H:%M %Z')\"}" \
            "$WEBHOOK" || echo "Discord send failed"